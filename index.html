<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Tracker Pro - Executivo</title>
  
  <!-- Tailwind CSS para o design -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React e ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel para compilar o código no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <style>

      body { background-color: white !important; }
      .print\:hidden { display: none !important; }
      .print\:shadow-none { box-shadow: none !important; }

      .print\:static { position: static !important; }

  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // Firebase
    let db = null;
    let firebaseInit = false;
    
    function initializeFirebase() {
      if (firebaseInit || typeof firebase === 'undefined') return;
      try {
        const firebaseConfig = {
          apiKey: "AIzaSyAvcXmI1Sa1r1vpy9W7HHGkJ7RGt-8xfIE",
          authDomain: "controle-atividades-adm.firebaseapp.com",
          projectId: "controle-atividades-adm",
          storageBucket: "controle-atividades-adm.firebasestorage.app",
          messagingSenderId: "881590529414",
          appId: "1:881590529414:web:c98200a4d1b14f6647d007"
        };
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
          db = firebase.firestore();
          firebaseInit = true;
        }
      } catch (error) {
        console.warn('Firebase init error (aplicação continua funcionando):', error.message);
      }
    }
    
    // Ícones embutidos diretamente para evitar erros de CDN externos (Lucide Icons SVG equivalentes)
    const Icon = ({ size = 24, className = '', children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const Play = (p) => <Icon {...p}><polygon points="5 3 19 12 5 21 5 3"></polygon></Icon>;
    const Pause = (p) => <Icon {...p}><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></Icon>;
    const RotateCcw = (p) => <Icon {...p}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></Icon>;
    const CheckSquare = (p) => <Icon {...p}><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></Icon>;
    const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></Icon>;
    const Activity = (p) => <Icon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></Icon>;
    const Coffee = (p) => <Icon {...p}><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></Icon>;
    const BarChart2 = (p) => <Icon {...p}><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></Icon>;
    const LogOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></Icon>;
    const Lock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></Icon>;
    const ListPlus = (p) => <Icon {...p}><path d="M11 12H3"></path><path d="M16 6H3"></path><path d="M16 18H3"></path><path d="M18 9v6"></path><path d="M21 12h-6"></path></Icon>;
    const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></Icon>;
    const LayoutDashboard = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></Icon>;
    const PieChart = (p) => <Icon {...p}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></Icon>;
    const Printer = (p) => <Icon {...p}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></Icon>;
    const Award = (p) => <Icon {...p}><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></Icon>;
    const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></Icon>;
    const Target = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></Icon>;
    const Save = (p) => <Icon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></Icon>;

    function App() {
      const [records, setRecords] = useState([]);
      const [activeTask, setActiveTask] = useState(null);
      
      // Ref para rastrear sincronização e evitar loops infinitos
      const lastSyncedRecordsRef = React.useRef([]);
      const isSyncingRef = React.useRef(false);
      
      // Função para comparar registros (evita updates desnecessários)
      const recordsChanged = (newRecords) => {
        if (newRecords.length !== lastSyncedRecordsRef.current.length) return true;
        return JSON.stringify(newRecords.map(r => r.id).sort()) !== 
               JSON.stringify(lastSyncedRecordsRef.current.map(r => r.id).sort());
      };
      
      // Estado de autenticação e navegação
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [showLoginModal, setShowLoginModal] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');
      
      // Dados do utilizador
      const [worker, setWorker] = useState('Daniel');
      const [loginInput, setLoginInput] = useState('');
      const [passwordInput, setPasswordInput] = useState('');
      const [loginError, setLoginError] = useState('');
      
      // Tarefas e Motivos
      const [tasks, setTasks] = useState(['Atualizar Tiny', 'Emitir NFD', 'Marketplaces', 'Análise de Faturas']);
      const [taskName, setTaskName] = useState('Atualizar Tiny');
      
      const [motivos, setMotivos] = useState(['Pausa para Café', 'Almoço', 'Reunião Externa']);
      const [novoMotivo, setNovoMotivo] = useState('');
      const [selectedMotivo, setSelectedMotivo] = useState(motivos[0]);
      
      const [novaTask, setNovaTask] = useState('');
      
      // Funcionários e Quantidade
      const [employees, setEmployees] = useState(['Daniel']);
      const [newEmployee, setNewEmployee] = useState('');
      const [taskQuantity, setTaskQuantity] = useState('');
      
      // Paginação do Registro de Atividades
      const [currentPage, setCurrentPage] = useState(1);
      const itemsPerPage = 20;

      // Timer em tempo real para a pausa
      const [now, setNow] = useState(Date.now());
      useEffect(() => {
        const interval = setInterval(() => {
          setNow(Date.now());
        }, 1000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (!taskName || !tasks.includes(taskName)) {
          setTaskName(tasks.length > 0 ? tasks[0] : '');
        }
      }, [tasks]);

      useEffect(() => {
        if (!motivos.includes(selectedMotivo) && motivos.length > 0) {
          setSelectedMotivo(motivos[0]);
        }
      }, [motivos, selectedMotivo]);

      // Refs para evitar loops nos listeners
      const tasksRef = React.useRef(tasks);
      const motivosRef = React.useRef(motivos);
      const employeesRef = React.useRef(employees);

      useEffect(() => { tasksRef.current = tasks; }, [tasks]);
      useEffect(() => { motivosRef.current = motivos; }, [motivos]);
      useEffect(() => { employeesRef.current = employees; }, [employees]);

      // Carregar registros do Firestore ao iniciar a página
      useEffect(() => {
        let isMounted = true;
        let retryCount = 0;
        const maxRetries = 5;

        const loadRecordsFromFirestore = async () => {
          try {
            initializeFirebase();
            
            // Aguardar até 3 segundos para Firebase estar pronto
            let currentDb = db;
            let waitCount = 0;
            while (!currentDb && waitCount < 30) {
              await new Promise(resolve => setTimeout(resolve, 100));
              currentDb = db;
              waitCount++;
            }
            
            if (!currentDb) {
              console.error('Firebase não inicializou a tempo (db null)');
              return;
            }

            console.log('Firebase inicializado com sucesso, carregando records');
            const querySnapshot = await currentDb.collection('records').get();
            const loadedRecords = [];
            
            querySnapshot.forEach((doc) => {
              const data = doc.data();
              if (data && data.id) {
                loadedRecords.push(data);
              }
            });
            
            if (isMounted && loadedRecords.length > 0) {
              // Ordenar por data (mais recentes primeiro)
              loadedRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
              setRecords(loadedRecords);
              console.log(`✅ Carregados ${loadedRecords.length} registros do Firestore`);
            } else if (isMounted) {
              // fallback localStorage
              try {
                const local = localStorage.getItem('local_records');
                if (local) {
                  const parsed = JSON.parse(local);
                  if (Array.isArray(parsed) && parsed.length > 0) {
                    parsed.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setRecords(parsed);
                    console.log(`✅ Carregados ${parsed.length} registros do localStorage (fallback)`);
                  }
                }
              } catch (e) {
                console.warn('Erro ao ler localStorage de fallback:', e.message);
              }
            }

            // Carregar configurações (tasks, motivos, employees)
            try {
              const tasksDoc = await currentDb.collection('config').doc('tasks').get();
              if (tasksDoc.exists && isMounted) {
                const data = tasksDoc.data();
                if (data && data.list) {
                  setTasks(data.list);
                  console.log('✅ Carregadas tasks do Firestore');
                }
              }
            } catch (e) {
              console.warn('Erro ao carregar tasks do Firestore:', e.message);
            }

            try {
              const motivosDoc = await currentDb.collection('config').doc('motivos').get();
              if (motivosDoc.exists && isMounted) {
                const data = motivosDoc.data();
                if (data && data.list) {
                  setMotivos(data.list);
                  console.log('✅ Carregados motivos do Firestore');
                }
              }
            } catch (e) {
              console.warn('Erro ao carregar motivos do Firestore:', e.message);
            }

            try {
              console.log('Tentando carregar employees do Firestore');
              const employeesDoc = await currentDb.collection('config').doc('employees').get();
              console.log('employeesDoc.exists:', employeesDoc.exists);
              if (employeesDoc.exists && isMounted) {
                const data = employeesDoc.data();
                console.log('data employees:', data);
                if (data && data.list) {
                  setEmployees(data.list);
                  console.log('✅ Carregados employees do Firestore');
                }
              }
            } catch (e) {
              console.warn('Erro ao carregar employees do Firestore:', e.message);
            }
          } catch (error) {
            retryCount++;
            if (retryCount < maxRetries) {
              console.warn(`Erro ao carregar (tentativa ${retryCount}/${maxRetries}):`, error.message);
              // Tentar novamente após 1 segundo
              setTimeout(loadRecordsFromFirestore, 1000);
            } else {
              console.warn('Falha ao carregar registros após múltiplas tentativas');
            }
          }
        };
        
        // Iniciar carregamento após 500ms
        const loadTimer = setTimeout(loadRecordsFromFirestore, 500);
        
        return () => {
          isMounted = false;
          clearTimeout(loadTimer);
        };
      }, []);

      const formatTime = (dateStr) => {
        if (!dateStr) return '--:--';
        return new Date(dateStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      };

      const formatDate = (dateStr) => {
        if (!dateStr) return '--/--';
        return new Date(dateStr).toLocaleDateString([], { day: '2-digit', month: '2-digit' });
      };

      const calculateDurationStr = (ms) => {
        if (isNaN(ms) || ms <= 0) return '00:00:00';
        const totalSeconds = Math.floor(ms / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      };

      const formatLiveDuration = (startMs, currentMs) => {
        const diff = Math.max(0, currentMs - startMs);
        return calculateDurationStr(diff);
      };

      const handleLogin = (e) => {
        e.preventDefault();
        setLoginError('');
        
        if (loginInput.trim().toLowerCase() === 'sara' && passwordInput === '7842') {
          setWorker('Daniel'); 
          setIsLoggedIn(true);
          setShowLoginModal(false);
          setPasswordInput(''); 
          setLoginInput('');
          
          // Carregar registros do Firestore imediatamente ao fazer login
          const loadAfterLogin = async () => {
            try {
              initializeFirebase();
              let currentDb = db;
              let waitCount = 0;
              while (!currentDb && waitCount < 20) {
                await new Promise(resolve => setTimeout(resolve, 100));
                currentDb = db;
                waitCount++;
              }
              
              if (currentDb) {
                const querySnapshot = await currentDb.collection('records').get();
                const loadedRecords = [];
                querySnapshot.forEach((doc) => {
                  const data = doc.data();
                  if (data && data.id) {
                    loadedRecords.push(data);
                  }
                });
                
                if (loadedRecords.length > 0) {
                  loadedRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
                  setRecords(loadedRecords);
                  console.log(`✅ Carregados ${loadedRecords.length} registros após login`);
                }
              }
            } catch (error) {
              console.warn('Erro ao carregar registros após login:', error.message);
            }
          };
          
          setTimeout(loadAfterLogin, 300);
        } else {
          setLoginError('Utilizador ou palavra-passe incorretos.');
        }
      };

      const handleLogout = () => {
        if (activeTask) {
          alert("Por favor, finalize a tarefa ativa antes de terminar a sessão.");
          return;
        }
        setIsLoggedIn(false);
        setActiveTab('dashboard'); 
      };

      const handleAddMotivo = (e) => {
        e.preventDefault();
        if (novoMotivo.trim() && !motivos.includes(novoMotivo.trim())) {
          setMotivos([...motivos, novoMotivo.trim()]);
          setNovoMotivo('');
        }
      };

      const handleRemoveMotivo = (motivoToRemove) => {
        setMotivos(motivos.filter(m => m !== motivoToRemove));
      };

      const handleAddTask = (e) => {
        e.preventDefault();
        if (novaTask.trim() && !tasks.includes(novaTask.trim())) {
          setTasks([...tasks, novaTask.trim()]);
          setNovaTask('');
        }
      };

      const handleRemoveTask = (taskToRemove) => {
        const newTasks = tasks.filter(t => t !== taskToRemove);
        setTasks(newTasks);
        if (taskName === taskToRemove) {
          setTaskName(newTasks.length > 0 ? newTasks[0] : '');
        }
      };

      const handleAddEmployee = (e) => {
        e.preventDefault();
        if (newEmployee.trim() && !employees.includes(newEmployee.trim())) {
          setEmployees([...employees, newEmployee.trim()]);
          setNewEmployee('');
        }
      };

      const handleRemoveEmployee = (name) => {
        setEmployees(employees.filter(e => e !== name));
        if (worker === name && employees.length > 1) {
          setWorker(employees.find(e => e !== name) || 'Daniel');
        }
      };

      const handleQuantityChange = (value) => {
        setTaskQuantity(value);
        if (activeTask) {
          setActiveTask({ ...activeTask, quantity: Number(value) || 0 });
        }
      };

      const handleStart = () => {
        if (activeTask && !activeTask.endTime) {
          alert("Finalize a tarefa atual antes de iniciar outra.");
          return;
        }

        if (!worker) {
          alert("Selecione um funcionário para iniciar a tarefa.");
          return;
        }
        
        const newTask = {
          id: Date.now(),
          date: new Date().toISOString(),
          worker,
          task: taskName,
          quantity: Number(taskQuantity) || 0,
          startTime: new Date().toISOString(),
          pauses: [],
          endTime: null,
          status: 'Em andamento'
        };
        setActiveTask(newTask);
      };

      const handlePause = () => {
        if (!activeTask) return;
        const pauses = activeTask.pauses || [];
        const lastPause = pauses[pauses.length - 1];
        if (lastPause && !lastPause.endTime) return; // já em pausa
        const newPause = {
          startTime: new Date().toISOString(),
          endTime: null,
          reason: selectedMotivo
        };
        setActiveTask({ 
          ...activeTask, 
          pauses: [...pauses, newPause],
          status: 'Em pausa' 
        });
      };

      const handleReturn = () => {
        if (!activeTask) return;
        const pauses = activeTask.pauses || [];
        const lastPause = pauses[pauses.length - 1];
        if (!lastPause || lastPause.endTime) return; // não está em pausa
        const updatedPauses = pauses.slice(0, -1).concat([{ ...lastPause, endTime: new Date().toISOString() }]);
        setActiveTask({ ...activeTask, pauses: updatedPauses, status: 'Retornado' });
      };

      const handleEnd = () => {
        if (!activeTask) return;
        
        const endTime = new Date().toISOString();
        const start = new Date(activeTask.startTime).getTime();
        const end = new Date(endTime).getTime();
        
        let totalMs = end - start;
        let pauseMs = 0;

        const pauses = (activeTask.pauses || []).map(p => {
          if (!p.endTime) {
            return { ...p, endTime: endTime };
          }
          return p;
        });

        pauseMs = pauses.reduce((acc, p) => {
          if (!p.startTime || !p.endTime) return acc;
          return acc + (new Date(p.endTime).getTime() - new Date(p.startTime).getTime());
        }, 0);

        activeTask.pauses = pauses;
        
        let produtivoMs = totalMs - pauseMs;
        const quantidade = Number(activeTask.quantity) || 0;
        const horasProdutivas = produtivoMs > 0 ? produtivoMs / 3600000 : 0;
        const quantidadePorHora = horasProdutivas > 0 ? quantidade / horasProdutivas : 0;

        const completedTask = {
          ...activeTask,
          endTime,
          totalMs,
          pauseMs,
          produtivoMs,
          pauses,
          quantidadePorHora,
          status: 'Concluído'
        };

        setRecords(prevRecords => [completedTask, ...prevRecords]);
        setActiveTask(null);
        setTaskQuantity('');
      };

      const handleDeleteRecord = (recordId) => {
        if (!isLoggedIn) {
          alert('Apenas usuários com login podem excluir registros.');
          return;
        }

        const confirmed = window.confirm('Tem certeza que deseja excluir este registro?');
        if (!confirmed) return;

        setRecords(prevRecords => {
          const updated = prevRecords.filter(r => r.id !== recordId);
          try {
            localStorage.setItem('local_records', JSON.stringify(updated));
          } catch (e) {
            console.warn('Erro ao atualizar localStorage após exclusão:', e.message);
          }
          return updated;
        });

        if (db) {
          db.collection('records').doc(String(recordId)).delete()
            .then(() => console.log(`Registro ${recordId} excluído no Firestore`))
            .catch(err => console.error('Erro ao excluir registro no Firestore:', recordId, err));

          // Atualiza índice também, se possível
          try {
            const fieldValue = (window.firebase && window.firebase.firestore && window.firebase.firestore.FieldValue) ? window.firebase.firestore.FieldValue : null;
            if (fieldValue && db.collection('meta')) {
              db.collection('meta').doc('recordsIndex').update({
                ids: fieldValue.arrayRemove(recordId),
                totalRecords: Math.max(0, records.length - 1),
                lastUpdated: new Date().toISOString()
              }).catch(err => console.warn('Erro ao atualizar índice após exclusão:', err));
            }
          } catch (err) {
            console.warn('Atualização de índice não suportada (Firestore FieldValue):', err.message);
          }
        }
      };

      const handleExportPausas = () => {
        if (!pausasDetalhadas.length) return;
        const header = ['Data', 'Funcionário', 'Tarefa', 'Motivo', 'Início', 'Fim', 'Duração'];
        const rows = pausasDetalhadas.map(p => [
          formatDate(p.date),
          p.worker,
          p.task,
          p.reason || '',
          formatTime(p.startTime),
          formatTime(p.endTime),
          calculateDurationStr(p.durationMs)
        ]);
        const csv = [header, ...rows]
          .map(r => r.map(v => `"${String(v ?? '').replace(/"/g, '""')}"`).join(';'))
          .join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `relatorio-pausas-${new Date().toISOString().slice(0, 10)}.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      };

      // Cálculos do Dashboard
      const totalWorkedMs = records.reduce((acc, curr) => acc + (curr.totalMs || 0), 0);
      const totalPauseMs = records.reduce((acc, curr) => acc + (curr.pauseMs || 0), 0);
      const totalProdutivoMs = records.reduce((acc, curr) => acc + (curr.produtivoMs || 0), 0);
      const eficiencia = totalWorkedMs > 0 ? Math.round((totalProdutivoMs / totalWorkedMs) * 100) : 0;

      // Cálculos de Relatório por Tarefa
      const statsPorTarefa = tasks.map(t => {
        const taskRecords = records.filter(r => r.task === t);
        const tTotal = taskRecords.reduce((acc, curr) => acc + (curr.totalMs || 0), 0);
        const tProdutivo = taskRecords.reduce((acc, curr) => acc + (curr.produtivoMs || 0), 0);
        const tPausa = taskRecords.reduce((acc, curr) => acc + (curr.pauseMs || 0), 0);
        const tEficiencia = tTotal > 0 ? Math.round((tProdutivo / tTotal) * 100) : 0;
        return {
          nome: t,
          count: taskRecords.length,
          totalMs: tTotal,
          produtivoMs: tProdutivo,
          pausaMs: tPausa,
          eficiencia: tEficiencia
        };
      });

      const maxProdutivoMs = Math.max(...statsPorTarefa.map(s => s.produtivoMs), 1);
      
      // Agregação de pausas detalhadas para relatório
      const pausasDetalhadas = records.flatMap((record, recordIndex) => {
        return (record.pauses || []).map((pause, pauseIndex) => ({
          key: `${record.id}-${pauseIndex}`,
          date: record.date,
          worker: record.worker,
          task: record.task,
          reason: pause.reason || '--',
          startTime: pause.startTime,
          endTime: pause.endTime || new Date().toISOString(),
          durationMs: pause.endTime ? 
            new Date(pause.endTime).getTime() - new Date(pause.startTime).getTime() : 0
        }));
      });
      
      // Salvar no Firestore quando records mudar (com debounce e proteção contra loops)
      useEffect(() => {
        initializeFirebase();
        
        // Não salvar se estamos sincronizando dados do Firebase
        if (isSyncingRef.current) {
          console.log('⏸ Pulando save - sincronização em andamento');
          return;
        }
        
        const saveTimer = setTimeout(() => {
          console.log('Tentando salvar records no Firestore', {dbExists: !!db, recordCount: records.length});
          if (db && records.length > 0) {
            // Marca como sincronizando para evitar loop
            isSyncingRef.current = true;
            
            // Salvar cada record individualmente para evitar sobrescrita entre usuários
            records.forEach((record) => {
              db.collection('records').doc(String(record.id)).set({
                ...record,
                updatedAt: new Date().toISOString()
              }).then(() => {
                console.log(`Registro ${record.id} salvo no Firestore`);
              }).catch((error) => console.error('Erro ao salvar registro:', record.id, error));
            });
            
            // Salvar também um índice com todos os IDs para referência rápida
            db.collection('meta').doc('recordsIndex').set({
              ids: records.map(r => r.id),
              lastUpdated: new Date().toISOString(),
              totalRecords: records.length
            }).catch((error) => console.warn('Erro ao atualizar índice:', error.message));
            
            // Aguard 1 segundo antes de permitir sincronização novamente
            setTimeout(() => {
              isSyncingRef.current = false;
            }, 1000);
          }

          // Salvar também localmente para fallback offline / browser refresh
          try {
            localStorage.setItem('local_records', JSON.stringify(records));
          } catch (e) {
            console.warn('Erro ao salvar localmente:', e.message);
          }
        }, 2000);
        return () => clearTimeout(saveTimer);
      }, [records]);

      // Salvar tasks no Firestore
      useEffect(() => {
        initializeFirebase();
        console.log('Salvando tasks, db:', db, 'firebaseInit:', firebaseInit);
        if (db) {
          console.log('Enviando set para tasks:', tasks);
          db.collection('config').doc('tasks').set({
            list: tasks,

      // Salvar motivos no Firestore

      // Sincronizar registros em tempo real com Firestore (listener) - Sempre ativo, com ou sem login
      useEffect(() => {
        let unsubscribe;
        
        const setupRealtimeSync = async () => {
          try {
            initializeFirebase();
            let currentDb = db;
            let waitCount = 0;
            while (!currentDb && waitCount < 20) {
              await new Promise(resolve => setTimeout(resolve, 100));
              currentDb = db;
              waitCount++;
            }
            
            if (currentDb) {
              let tasksUnsub, motivosUnsub, employeesUnsub;
              // Listener para mudanças em tempo real na coleção 'records'
              // Ativo SEMPRE, independente de login (registros são públicos)
              unsubscribe = currentDb.collection('records').onSnapshot(
                (querySnapshot) => {
                  console.log('Listener onSnapshot disparado, docs:', querySnapshot.size);
                  const loadedRecords = [];
                  querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data && data.id) {
                      loadedRecords.push(data);
                    }
                  });
                  
                  if (loadedRecords.length > 0) {
                    // Ordenar por data (mais recentes primeiro)
                    loadedRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
                    
                    // Verificar se realmente houve mudanças antes de atualizar
                    if (recordsChanged(loadedRecords)) {
                      console.log(`🔄 Sincronizados ${loadedRecords.length} registros em tempo real (NOVOS DADOS)`);
                      isSyncingRef.current = true;
                      lastSyncedRecordsRef.current = loadedRecords;
                      setRecords(loadedRecords);
                      
                      // Permitir save novamente após a sincronização
                      setTimeout(() => {
                        isSyncingRef.current = false;
                      }, 500);
                    } else {
                      console.log(`ℹ️ Listener disparado, mas sem changes (mesmos dados)`);
                    }
                  }
                },
                (error) => {
                  console.warn('Erro no listener de sincronização:', error.message);
                }
              );

              // Listeners para config em tempo real com verificação para evitar loops
              tasksUnsub = currentDb.collection('config').doc('tasks').onSnapshot((doc) => {
                if (doc.exists) {
                  const data = doc.data();
                  if (data && data.list && JSON.stringify(data.list) !== JSON.stringify(tasksRef.current)) {

              employeesUnsub = currentDb.collection('config').doc('employees').onSnapshot((doc) => {

                  if (data && data.list && JSON.stringify(data.list) !== JSON.stringify(employeesRef.current)) {
                    setEmployees(data.list);
                    console.log('Employees atualizados em tempo real');
                  }
                }
              }, (error) => console.warn('Erro no listener de employees:', error));
            }
          } catch (error) {
            console.warn('Erro ao configurar sincronização em tempo real:', error.message);
          }
        };
        
        // Configurar sincronização assim que o App monta (independente de login)
        setupRealtimeSync();
        
        return () => {
          if (unsubscribe) {
            unsubscribe();
          }
          if (tasksUnsub) {
            tasksUnsub();
          }
          if (motivosUnsub) {
            motivosUnsub();
          }

                  </div>

                  <div className="bg-white p-5 rounded-xl border border-slate-100 shadow-sm flex flex-col justify-between">
                    <div className="text-slate-500 font-medium text-sm mb-4">Melhor Desempenho</div>
                    <div>
                      <p className="text-2xl font-bold text-slate-800">
                        {statsPorTarefa.length > 0 ? Math.max(...statsPorTarefa.map(s => s.eficiencia)) : 0}%
                      </p>
                      <p className="text-xs text-slate-400 mt-1">Eficiência máxima alcançada</p>
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  {/* Gráfico de Distribuição por Tarefa */}
                  <div className="bg-white p-6 rounded-xl border border-slate-100 shadow-sm">
                    <h3 className="text-lg font-bold mb-6 text-slate-800 flex items-center gap-2">
                      <BarChart2 className="text-indigo-600" size={20} />
                      Distribuição de Tempo por Atividade
                    </h3>
                    
                    <div className="space-y-4">
                      {statsPorTarefa.filter(s => s.produtivoMs > 0).map(stat => (
                        <div key={stat.nome} className="flex items-center gap-4">
                          <div className="w-1/3 text-sm font-medium text-slate-700 truncate" title={stat.nome}>
                            {stat.nome}
                          </div>
                          <div className="w-2/3 flex items-center gap-3">
                            <div className="flex-1 h-4 bg-slate-100 rounded-md overflow-hidden flex relative">
                              <div 
                                className="h-full bg-indigo-500 rounded-md transition-all duration-1000 ease-out" 
                                style={{ 
                                  width: `${(stat.produtivoMs / maxProdutivoMs) * 100}%`,
                                  minWidth: stat.produtivoMs > 0 ? '4px' : '0'
                                }}
                              ></div>
                            </div>
                            <div className="w-20 text-right">
                              <span className="text-sm font-bold text-slate-700">
                                {calculateDurationStr(stat.produtivoMs)}
                              </span>
                            </div>
                          </div>
                        </div>
                      ))}
                      {statsPorTarefa.filter(s => s.produtivoMs > 0).length === 0 && (
                        <p className="text-slate-400 text-sm text-center py-8">Nenhuma atividade registada ainda.</p>
                      )}
                    </div>
                  </div>

                  {/* Top Tarefas e Estatísticas */}
                  <div className="bg-white p-6 rounded-xl border border-slate-100 shadow-sm">
                    <h3 className="text-lg font-bold mb-6 text-slate-800 flex items-center gap-2">
                      <Award className="text-indigo-600" size={20} />
                      Ranking de Desempenho
                    </h3>
                    
                    <div className="space-y-4">
                      {statsPorTarefa.filter(s => s.count > 0).sort((a, b) => b.eficiencia - a.eficiencia).slice(0, 5).map((stat, idx) => (
                        <div key={stat.nome} className="flex items-center gap-4 p-3 bg-slate-50 rounded-lg">
                          <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${
                            idx === 0 ? 'bg-yellow-100 text-yellow-700' : 
                            idx === 1 ? 'bg-slate-100 text-slate-700' : 
                            idx === 2 ? 'bg-orange-100 text-orange-700' : 
                            'bg-slate-100 text-slate-600'
                          }`}>
                            {idx + 1}
                          </div>
                          <div className="flex-1">
                            <p className="font-medium text-slate-800 text-sm">{stat.nome}</p>
                            <p className="text-xs text-slate-500">{stat.count} execuções</p>
                          </div>
                          <div className="text-right">
                            <p className={`text-sm font-bold ${
                              stat.eficiencia >= 80 ? 'text-emerald-600' : 
                              stat.eficiencia >= 60 ? 'text-indigo-600' : 
                              'text-orange-500'
                            }`}>
                              {stat.eficiencia}%
                            </p>
                            <p className="text-xs text-slate-400">{calculateDurationStr(stat.produtivoMs)}</p>
                          </div>
                        </div>
                      ))}
                      {statsPorTarefa.filter(s => s.count > 0).length === 0 && (
                        <p className="text-slate-400 text-sm text-center py-8">Nenhuma atividade para classificar.</p>
                      )}
                    </div>
                  </div>
                </div>

                {/* Timeline dos Últimos Registros */}
                <div className="bg-white p-6 rounded-xl border border-slate-100 shadow-sm">
                  <h3 className="text-lg font-bold mb-6 text-slate-800 flex items-center gap-2">
                    <Clock className="text-indigo-600" size={20} />
                    Timeline de Atividades Recentes
                  </h3>
                  
                  <div className="space-y-4 max-h-96 overflow-y-auto">
                    {records.slice(0, 10).map((rec, idx) => (
                      <div key={rec.id} className="flex items-start gap-4 p-4 bg-slate-50 rounded-lg hover:bg-slate-100 transition-colors">
                        <div className="flex-shrink-0 w-10 h-10 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center font-bold text-sm">
                          {idx + 1}
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center justify-between mb-2">
                            <h4 className="font-semibold text-slate-800 truncate">{rec.task}</h4>
                            <span className="text-xs text-slate-500 bg-white px-2 py-1 rounded-full">
                              {formatDate(rec.date)}
                            </span>
                          </div>
                          <div className="flex items-center gap-4 text-sm text-slate-600 mb-2">
                            <span className="flex items-center gap-1">
                              <span className="w-2 h-2 bg-blue-500 rounded-full"></span>
                              {rec.worker}
                            </span>
                            <span className="flex items-center gap-1">
                              <span className="w-2 h-2 bg-green-500 rounded-full"></span>
                              {calculateDurationStr(rec.produtivoMs)} produtivo
                            </span>
                            {rec.pauseMs > 0 && (
                              <span className="flex items-center gap-1">
                                <span className="w-2 h-2 bg-orange-500 rounded-full"></span>
                                {calculateDurationStr(rec.pauseMs)} pausa
                              </span>
                            )}
                          </div>
                          <div className="flex items-center justify-between">
                            <span className="text-xs text-slate-500">
                              {formatTime(rec.startTime)} - {formatTime(rec.endTime)}
                            </span>
                            <div className="flex items-center gap-2">
                              {rec.quantity > 0 && (
                                <span className="text-xs bg-indigo-50 text-indigo-700 px-2 py-1 rounded-full">
                                  {rec.quantity} unidades
                                </span>
                              )}
                              <span className={`text-xs px-2 py-1 rounded-full font-medium ${
                                rec.quantidadePorHora >= 10 ? 'bg-emerald-50 text-emerald-700' :
                                rec.quantidadePorHora >= 5 ? 'bg-blue-50 text-blue-700' :
                                'bg-slate-50 text-slate-600'
                              }`}>
                                {rec.quantidadePorHora ? rec.quantidadePorHora.toFixed(1) : '--'} qtd/h
                              </span>
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                    {records.length === 0 && (
                      <div className="text-center py-12">
                        <Clock size={48} className="text-slate-300 mx-auto mb-4" />
                        <p className="text-slate-400 text-sm">Nenhuma atividade registada ainda.</p>
                        <p className="text-slate-400 text-xs mt-1">As atividades aparecerão aqui quando forem concluídas.</p>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
